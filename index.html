  <style>
    body { font-family: 'Heebo', system-ui, -apple-system, sans-serif; margin: 0; padding: 0; }
    
    /* INBAR SPECIFIC ANIMATIONS */
    @keyframes inbar-shake {
        0%, 100% { transform: translateX(0); }
        20%, 60% { transform: translateX(-5px); }
        40%, 80% { transform: translateX(5px); }
    }
    .inbar-shake { animation: inbar-shake 0.4s ease-in-out; }
    
    @keyframes inbar-fadeIn {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
    }
    .inbar-fade-in { animation: inbar-fadeIn 0.3s ease-in-out; }
    
    .inbar-btn-hover-effect { transition: all 0.2s ease-in-out; }
    .inbar-btn-hover-effect:hover { 
        transform: translateY(-2px); 
        box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06); 
    }

    .correct-anim { background-color: #10b981 !important; color: white !important; border-color: #10b981 !important; }
    .wrong-anim { background-color: #ef4444 !important; color: white !important; border-color: #ef4444 !important; }
  </style>
</head>

    const ArrowLeft = (p) => <Icon {...p} d={'<path d="m12 19-7-7 7-7"/><path d="M19 12H5"/>'} />;
    const Home = (p) => <Icon {...p} d={'<path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/>'} />;
    const Sparkle = (p) => <Icon {...p} d={'<path d="M9.937 15.5A2 2 0 0 0 8.5 14.063l-6.135-1.582a.5.5 0 0 1 0-.962L8.5 9.936A2 2 0 0 0 9.937 8.5l1.582-6.135a.5.5 0 0 1 .963 0L14.063 8.5A2 2 0 0 0 15.5 9.937l6.135 1.581a.5.5 0 0 1 0 .964L15.5 14.063a2 2 0 0 0-1.437 1.437l-1.582 6.135a.5.5 0 0 1-.963 0z"/>'} />;
    const LayoutTemplate = (p) => <Icon {...p} d={'<rect width="18" height="7" x="3" y="3" rx="1"/><rect width="9" height="7" x="3" y="14" rx="1"/><rect width="5" height="7" x="16" y="14" rx="1"/>'} />;

    // ============================================================================
    // SHARED UTILS & DATA
    // ============================================================================

    const shuffleArray = (array) => {
      const newArr = [...array];
      for (let i = newArr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [newArr[i], newArr[j]] = [newArr[j], newArr[i]];
      }
      return newArr;
    };

    // ============================================================================
    // SHELLY'S APP DATA & HELPERS
    // ============================================================================

    const SHELLY_QUESTIONS = [
      { word: "rigid", correct: "נוקשה", wrong: ["רך", "שקוף", "מהיר"] },
      { word: "grotesque(ly)", correct: "גרוטסקי / מעוות", wrong: ["יפהפה / מושלם", "רגיל / שגרתי", "עדין / רך"] },
      { word: "frantically", correct: "בטירוף / בקדחתנות", wrong: ["ברוגע", "באיטיות", "בשמחה"] },
      { word: "carnage", correct: "קטל / טבח", wrong: ["שלום / הרמוניה", "חגיגה", "מנוחה"] },
      { word: "affectionate(ly)", correct: "אוהב / מלא חיבה", wrong: ["שונא / עויין", "אדיש", "כועס"] },
      { word: "pervaded", correct: "התפשט / חדר", wrong: ["נעלם / התפוגג", "התכווץ", "עצר"] },
      { word: "hearth", correct: "אח / קמין", wrong: ["חלון", "גג", "רצפה / שטיח"] },
      { word: "polished", correct: "מלוטש / מבריק", wrong: ["מחוספס", "מלוכלך", "שבור"] },
      { word: "to treasure", correct: "להעריך / להוקיר", wrong: ["לזרוק / לנטוש", "לשכוח", "להרוס"] },
      { word: "rehearsed", correct: "מתורגל / עבר חזרות", wrong: ["מאולתר", "חדש", "פתאומי"] },
      { word: "unexpected", correct: "לא צפוי", wrong: ["רגיל", "מתוכנן", "משעמם"] },
      { word: "depth", correct: "עומק", wrong: ["רוחב", "גובה", "שטח"] },
      { word: "shallow", correct: "רדוד", wrong: ["עמוק", "רחב", "גבוה"] },
      { word: "impatience", correct: "חוסר סבלנות", wrong: ["רוגע / שלווה", "שמחה", "אהבה"] },
      { word: "injustice", correct: "חוסר צדק", wrong: ["שוויון", "חוק", "אמת"] },
      { word: "cruelty", correct: "אכזריות", wrong: ["נדיבות", "חמלה / רחמים", "רכות"] },

      { word: "exaggerated", correct: "מוגזם", wrong: ["מדויק", "מופחת", "רגיל"] },
      { word: "gradually", correct: "בהדרגה", wrong: ["בבת אחת", "מהר", "לעולם לא"] },
      { word: "irritated", correct: "עצבני / מרוגז", wrong: ["רגוע", "שמח", "עייף"] },
      { word: "expertise", correct: "מומחיות", wrong: ["חוסר ידע", "טיפשות", "חולשה"] },
      { word: "loss", correct: "אובדן / הפסד", wrong: ["ניצחון", "רווח", "מציאה"] },
      { word: "occasionally", correct: "מדי פעם", wrong: ["תמיד", "אף פעם", "כל יום"] },
      { word: "identical", correct: "זהה", wrong: ["שונה", "דומה", "הפוך"] },
      { word: "failure", correct: "כישלון", wrong: ["הצלחה", "ניסיון", "תחרות"] },
      { word: "to be puzzled", correct: "להיות מבולבל", wrong: ["להיות בטוח", "לשמוח", "לכעוס"] },
      { word: "remarkable", correct: "יוצא דופן / ראוי לציון", wrong: ["רגיל", "משעמם", "גרוע"] },
      { word: "self-possessed", correct: "שולט בעצמו / קר רוח", wrong: ["לחוץ / היסטרי", "משוגע", "פזיז"] },
      { word: "serene", correct: "שלוו / רגוע", wrong: ["סוער", "רועש", "מתוח"] },
      { word: "excruciating", correct: "מייסר / כואב מאוד", wrong: ["נעים", "קל / פשוט", "מצחיק"] },
      { word: "stunned", correct: "המום", wrong: ["משועמם", "מוכן", "רגוע"] },
      { word: "to insist", correct: "להתעקש", wrong: ["לוותר", "להסכים", "לשאול"] }
    ];

    const checkWrittenAnswer = (userInput, correctAnswer, isEnglishTarget) => {
      if (!userInput) return false;
      const cleanInput = userInput.trim().toLowerCase().replace(/["'״׳]/g, "");

      if (isEnglishTarget) {
        const baseCorrect = correctAnswer.trim().toLowerCase();
        const cleanCorrect = baseCorrect.replace(/["'״׳]/g, "");
        const possibleMatches = new Set([cleanCorrect]);
        
        if (cleanCorrect.startsWith("to ")) possibleMatches.add(cleanCorrect.substring(3).trim());
        
        const withoutParentheses = cleanCorrect.replace(/\s*\([^)]*\)\s*/g, ' ').replace(/\s+/g, ' ').trim();
        possibleMatches.add(withoutParentheses);
        
        const insideParenthesesCleaned = cleanCorrect.replace(/[()]/g, '').replace(/\s+/g, ' ').trim();
        possibleMatches.add(insideParenthesesCleaned);

        if (cleanCorrect.includes(",")) {
          const parts = cleanCorrect.split(",").map(p => p.trim());
          parts.forEach(p => {
            possibleMatches.add(p);
            if (p.startsWith("to ")) possibleMatches.add(p.substring(3).trim());
          });
        }

        return Array.from(possibleMatches).some(match => {
          if (match.length <= 1) return false;
          return cleanInput === match || cleanInput.replace("to ", "").trim() === match.replace("to ", "").trim();
        });
      } else {
        const cleanHebrewInput = cleanInput.replace(/\s+/g, "");
        const correctParts = correctAnswer
          .split(/[/,，\s+או\s+]/)
          .map(part => part.trim().toLowerCase().replace(/["'״׳]/g, ""))
          .filter(part => part.length > 0);

        return correctParts.some(part => {
          const cleanPart = part.replace(/\s+/g, "");
          if (cleanPart.length <= 1) return false;
          return cleanHebrewInput === cleanPart || cleanHebrewInput.includes(cleanPart) || cleanPart.includes(cleanHebrewInput);
        });
      }
    };

    // ============================================================================
    // INBAR's APP DATA & HELPERS
    // ============================================================================

    const INBAR_VOCABULARY = [
      { en: "rigid", he: ["נוקשה"], mainHe: "נוקשה" },
      { en: "grotesque(ly)", he: ["גרוטסקי", "מגוחך", "בצורה גרוטסקית", "מפלצתי"], mainHe: "גרוטסקי / מגוחך" },
      { en: "frantically", he: ["בטירוף", "בבהלה"], mainHe: "בטירוף / בבהלה" },
      { en: "carnage", he: ["טבח", "קטל"], mainHe: "טבח / קטל" },
      { en: "affectionate(ly)", he: ["בחיבה", "אוהב", "מלא חיבה"], mainHe: "בחיבה / אוהב" },

      { en: "hearth", he: ["אח", "קמין"], mainHe: "אח / קמין" },
      { en: "polished", he: ["מלוטש", "מצוחצח"], mainHe: "מלוטש / מצוחצח" },
      { en: "to treasure", he: ["להוקיר", "להעריך"], mainHe: "להוקיר / להעריך" },
      { en: "rehearsed", he: ["מתורגל", "עשה חזרות", "חזר על"], mainHe: "מתורגל / עשה חזרות" },
      { en: "unexpected", he: ["לא צפוי", "בלתי צפוי"], mainHe: "לא צפוי" },
      { en: "depth", he: ["עומק"], mainHe: "עומק" },
      { en: "shallow", he: ["רדוד"], mainHe: "רדוד" },
      { en: "impatience", he: ["חוסר סבלנות", "אי סבלנות"], mainHe: "חוסר סבלנות" },
      { en: "injustice", he: ["חוסר צדק", "אי צדק"], mainHe: "חוסר צדק" },
      { en: "cruelty", he: ["אכזריות"], mainHe: "אכזריות" },
      { en: "passionately", he: ["בתשוקה", "בלהט"], mainHe: "בתשוקה / בלהט" },
      { en: "exaggerated", he: ["מוגזם"], mainHe: "מוגזם" },
      { en: "gradually", he: ["בהדרגה"], mainHe: "בהדרגה" },
      { en: "irritated", he: ["מעוצבן", "מגורה", "עצבני"], mainHe: "מעוצבן / מגורה" },
      { en: "(area of) expertise", he: ["תחום מומחיות", "מומחיות"], mainHe: "תחום מומחיות" },
      { en: "loss", he: ["אובדן", "הפסד"], mainHe: "אובדן / הפסד" },
      { en: "occasion", he: ["אירוע", "הזדמנות"], mainHe: "אירוע / הזדמנות" },
      { en: "identical", he: ["זהה"], mainHe: "זהה" },
      { en: "failure", he: ["כישלון"], mainHe: "כישלון" },
      { en: "to be puzzled", he: ["להיות מופתע", "להיות נבוך", "להיות מבולבל", "מבולבל", "מופתע", "נבוך"], mainHe: "להיות מופתע / מבולבל" },
      { en: "remarkable", he: ["יוצא מן הכלל", "ראוי לציון", "מדהים"], mainHe: "יוצא מן הכלל / ראוי לציון" },
      { en: "self-possessed", he: ["שולט בעצמו", "בטוח בעצמו", "קור רוח"], mainHe: "שולט בעצמו / בטוח בעצמו" },
      { en: "serene", he: ["שליו", "רגוע"], mainHe: "שליו / רגוע" },
      { en: "excruciating", he: ["מייסר"], mainHe: "מייסר" },
      { en: "stunned, to stun", he: ["המום", "להמם", "המום להמם", "המום, להמם"], mainHe: "המום, להמם" },
      { en: "to insist", he: ["להתעקש"], mainHe: "להתעקש" }
    ];

    const triggerConfetti = () => {
      const colors = ['#10b981', '#3b82f6', '#f59e0b', '#ef4444', '#8b5cf6'];
      for(let i=0; i<50; i++) {
          const conf = document.createElement('div');
          conf.style.position = 'fixed'; 
          conf.style.width = '10px';
          conf.style.height = '10px';
          conf.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
          conf.style.left = Math.random() * 100 + 'vw';
          conf.style.top = '-10px';
          conf.style.borderRadius = Math.random() > 0.5 ? '50%' : '0';
          conf.style.zIndex = '9999';
          conf.style.opacity = '0.8';
          document.body.appendChild(conf);

          const speed = 1 + Math.random() * 3;
          let pos = -10;
          let angle = Math.random() * Math.PI * 2;
          
          const fall = setInterval(() => {
              pos += speed;
              conf.style.top = pos + 'px';
              conf.style.transform = `rotate(${pos}deg) translateX(${Math.sin(angle)*2}px)`;
              angle += 0.1;
              if (pos > window.innerHeight) {
                  clearInterval(fall);
                  conf.remove();
              }
          }, 16);
      }
    };


    // ============================================================================
    // COMPONENT 1: SHELLY'S APP
    // ============================================================================

    function ShellyApp({ onSwitchSite }) {
      const [started, setStarted] = useState(false);
      const [quizMode, setQuizMode] = useState('hebrew'); 
      const [quizFormat, setQuizFormat] = useState('choice'); 
      const [questions, setQuestions] = useState([]);
      const [currentIndex, setCurrentIndex] = useState(0);
      const [score, setScore] = useState(0);
      const [selectedOption, setSelectedOption] = useState(null);
      
      const [writtenInput, setWrittenInput] = useState('');
      const [writtenFeedback, setWrittenFeedback] = useState(null); 
      
      const [isFinished, setIsFinished] = useState(false);
      const [showFeedback, setShowFeedback] = useState(false);
      
      const inputRef = useRef(null);

      const initializeQuiz = () => {
        const shuffledQuestions = shuffleArray(SHELLY_QUESTIONS).map((q) => {
          let questionWord = "";
          let correctOption = "";
          let wrongOptions = [];
          let wordLanguage = "en"; 

          if (quizMode === 'hebrew') {
            questionWord = q.word;
            correctOption = q.correct;
            wrongOptions = q.wrong;
            wordLanguage = "en";
          } else {
            questionWord = q.correct;
            correctOption = q.word;
            wordLanguage = "he";
            const englishPool = SHELLY_QUESTIONS.filter(item => item.word !== q.word).map(item => item.word);
            wrongOptions = shuffleArray(englishPool).slice(0, 3);
          }

          const options = shuffleArray([
            { text: correctOption, isCorrect: true },
            ...wrongOptions.map(w => ({ text: w, isCorrect: false }))
          ]);

          return { word: questionWord, correctText: correctOption, options, wordLanguage };
        });

        setQuestions(shuffledQuestions);
        setCurrentIndex(0);
        setScore(0);
        setSelectedOption(null);
        setWrittenInput('');
        setWrittenFeedback(null);
        setIsFinished(false);
        setShowFeedback(false);
        setStarted(true);
      };

      useEffect(() => {
        if (started && quizFormat === 'write' && !showFeedback && inputRef.current) {
          inputRef.current.focus();
        }
      }, [started, currentIndex, quizFormat, showFeedback]);

      const handleBackToMenu = () => {
        setStarted(false);
        setIsFinished(false);
        setWrittenInput('');
        setWrittenFeedback(null);
        setSelectedOption(null);
        setShowFeedback(false);
      };

      const handleOptionClick = (option) => {
        if (showFeedback) return;
        setSelectedOption(option);
        setShowFeedback(true);
        
        if (option.isCorrect) setScore(prev => prev + 1);

        setTimeout(() => {
          if (currentIndex < questions.length - 1) {
            setCurrentIndex(prev => prev + 1);
            setSelectedOption(null);
            setShowFeedback(false);
          } else {
            setIsFinished(true);
          }
        }, 1200);
      };

      const handleWrittenSubmit = (e) => {
        if (e) e.preventDefault();
        if (showFeedback || !writtenInput.trim()) return;

        const currentQ = questions[currentIndex];
        const isCorrect = checkWrittenAnswer(writtenInput, currentQ.correctText, quizMode === 'english');

        setShowFeedback(true);
        if (isCorrect) {
          setWrittenFeedback('correct');
          setScore(prev => prev + 1);
        } else {
          setWrittenFeedback('incorrect');
        }
      };

      const handleNextQuestion = () => {
        setWrittenInput('');
        setWrittenFeedback(null);
        setShowFeedback(false);
        
        if (currentIndex < questions.length - 1) setCurrentIndex(prev => prev + 1);
        else setIsFinished(true);
      };

      if (!started) {
        return (
          <div dir="rtl" className="min-h-screen bg-gradient-to-br from-pink-100 via-purple-100 to-indigo-100 flex flex-col items-center justify-center p-4 font-sans">
            
            <button onClick={onSwitchSite} className="absolute top-4 left-4 bg-white/70 hover:bg-white text-purple-700 p-3 rounded-full shadow-sm flex items-center gap-2 transition-all font-bold">
              <Home size={18} /> חזרה לפורטל הראשי
            </button>

            <div className="bg-white/80 backdrop-blur-sm p-6 md:p-8 rounded-3xl shadow-xl max-w-lg w-full text-center border-4 border-pink-200 relative overflow-hidden mt-8">
              <div className="absolute top-4 right-4 text-pink-400 opacity-50"><Cat size={32} /></div>
              <div className="absolute bottom-4 left-4 text-purple-400 opacity-50"><Cat size={32} /></div>
              
              <div className="flex justify-center mb-4">
                <div className="bg-pink-100 p-4 rounded-full">
                  <Sparkles className="text-pink-500 w-12 h-12" />
                </div>
              </div>
              
              <h1 className="text-3xl font-bold text-gray-800 mb-2">מוכנה למבחן באנגלית? 📚</h1>
              <p className="text-sm md:text-base text-gray-600 mb-6 leading-relaxed">
                תרגול מקיף על כל 32 המילים של The Giver.<br/>
                <span className="font-bold text-purple-600">פיצפץ ודפני 🐈🐈‍⬛</span> כאן כדי לעזור לך להצליח!
              </p>

              <div className="bg-purple-50/60 p-4 rounded-2xl border border-purple-100 mb-4 text-right">
                <div className="flex items-center gap-2 text-purple-700 font-bold mb-3">
                  <Languages size={18} />
                  <span>בחרי את שפת התשובות במבחן:</span>
                </div>
                <div className="grid grid-cols-2 gap-3">
                  <button
                    type="button"
                    onClick={() => setQuizMode('hebrew')}
                    className={`py-3 px-2 rounded-xl font-bold transition-all duration-200 text-sm ${quizMode === 'hebrew' ? 'bg-gradient-to-r from-pink-400 to-purple-500 text-white shadow-md scale-105' : 'bg-white text-gray-600 hover:bg-gray-100 border border-gray-200'}`}
                  >
                    תשובות בעברית 🇮🇱
                  </button>
                  <button
                    type="button"
                    onClick={() => setQuizMode('english')}
                    className={`py-3 px-2 rounded-xl font-bold transition-all duration-200 text-sm ${quizMode === 'english' ? 'bg-gradient-to-r from-pink-400 to-purple-500 text-white shadow-md scale-105' : 'bg-white text-gray-600 hover:bg-gray-100 border border-gray-200'}`}
                  >
                    תשובות באנגלית 🇬🇧
                  </button>
                </div>
              </div>

              <div className="bg-pink-50/60 p-4 rounded-2xl border border-pink-100 mb-6 text-right">
                <div className="flex items-center gap-2 text-pink-700 font-bold mb-3">
                  <PenTool size={18} />
                  <span>בחרי את סוג השאלות במבחן:</span>
                </div>
                <div className="grid grid-cols-2 gap-3">
                  <button
                    type="button"
                    onClick={() => setQuizFormat('choice')}
                    className={`py-3 px-2 rounded-xl font-bold transition-all duration-200 text-sm ${quizFormat === 'choice' ? 'bg-gradient-to-r from-pink-400 to-purple-500 text-white shadow-md scale-105' : 'bg-white text-gray-600 hover:bg-gray-100 border border-gray-200'}`}
                  >
                    שאלות אמריקאיות 🎯
                  </button>
                  <button
                    type="button"
                    onClick={() => setQuizFormat('write')}
                    className={`py-3 px-2 rounded-xl font-bold transition-all duration-200 text-sm ${quizFormat === 'write' ? 'bg-gradient-to-r from-pink-400 to-purple-500 text-white shadow-md scale-105' : 'bg-white text-gray-600 hover:bg-gray-100 border border-gray-200'}`}
                  >
                    לכתוב לבד ✏️
                  </button>
                </div>
              </div>
              
              <button 
                type="button"
                onClick={initializeQuiz}
                className="bg-gradient-to-r from-pink-400 to-purple-500 text-white text-xl font-bold py-4 px-10 rounded-full shadow-lg hover:shadow-xl hover:scale-105 transition-all duration-200 flex items-center justify-center mx-auto gap-2"
              >
                <Heart size={24} /> מתחילים!
              </button>
            </div>
          </div>
        );
      }

      if (isFinished) {
        return (
          <div dir="rtl" className="min-h-screen bg-gradient-to-br from-pink-100 via-purple-100 to-indigo-100 flex items-center justify-center p-4 font-sans">
            <div className="bg-white/90 backdrop-blur-sm p-8 rounded-3xl shadow-xl max-w-lg w-full text-center border-4 border-purple-200">
              <Trophy className="w-20 h-20 text-yellow-400 mx-auto mb-4" />
              <h2 className="text-4xl font-bold text-gray-800 mb-2">כל הכבוד! 🎉</h2>
              <p className="text-xl text-gray-600 mb-6">סיימת את התרגול בהצלחה!</p>
              
              <div className="bg-purple-50 rounded-2xl p-6 mb-8 shadow-inner">
                <div className="text-5xl font-black text-purple-600 mb-2">
                  {score} <span className="text-2xl text-purple-400">/ {questions.length}</span>
                </div>
                <p className="text-gray-500 font-medium">תשובות נכונות</p>
                {score === questions.length ? (
                  <p className="text-pink-500 font-bold mt-4 animate-bounce">ציון מושלם!! פיצפץ ודפני קופצים מאושר! 🐾👑🐈</p>
                ) : score >= 28 ? (
                  <p className="text-purple-600 font-bold mt-4">וואו! כמעט מושלם! את פשוט אלופה! 💖</p>
                ) : (
                  <p className="text-gray-600 font-medium mt-4">כל הכבוד על המאמץ! תרגול נוסף יביא אותך לציון מושלם! ⭐</p>
                )}
              </div>

              <div className="flex flex-col sm:flex-row gap-3 justify-center">
                <button type="button" onClick={initializeQuiz} className="bg-purple-500 hover:bg-purple-600 text-white font-bold py-3 px-8 rounded-full shadow-md transition-all duration-200 flex items-center justify-center gap-2">
                  <RefreshCw size={20} /> נסיון נוסף
                </button>
                <button type="button" onClick={handleBackToMenu} className="bg-gray-100 hover:bg-gray-200 text-gray-700 font-bold py-3 px-8 rounded-full border border-gray-300 transition-all duration-200 flex items-center justify-center gap-2">
                  <ArrowLeft size={20} /> חזרה אחורה
                </button>
              </div>
            </div>
          </div>
        );
      }

      const currentQ = questions[currentIndex];

      return (
        <div dir="rtl" className="min-h-screen bg-gradient-to-br from-pink-50 to-purple-50 flex flex-col items-center justify-center p-4 font-sans">
          <div className="max-w-2xl w-full">
            <div className="flex flex-col sm:flex-row justify-between items-center gap-4 mb-6 px-2">
              <button type="button" onClick={handleBackToMenu} className="flex items-center gap-2 text-purple-600 hover:text-purple-800 bg-white border border-purple-200 hover:border-purple-300 px-4 py-2 rounded-full font-bold shadow-sm transition-all duration-150 self-start sm:self-auto text-sm">
                <ArrowLeft size={16} /> חזרה לתפריט
              </button>
              
              <div className="flex gap-3 justify-end w-full sm:w-auto">
                <div className="text-purple-600 font-bold bg-purple-100 px-4 py-2 rounded-full shadow-sm flex items-center gap-2 text-sm">
                  <Star size={16} /> שאלה {currentIndex + 1} מתוך {questions.length}
                </div>
                <div className="text-pink-600 font-bold bg-pink-100 px-4 py-2 rounded-full shadow-sm flex items-center gap-2 text-sm">
                  <Heart size={16} /> ציון: {score}
                </div>
              </div>
            </div>

            <div className="bg-white p-6 md:p-8 rounded-3xl shadow-lg border-b-8 border-purple-200 mb-6 relative">
              <p className="text-gray-500 text-center mb-2 font-medium">מה הפירוש של המילה:</p>
              <div className="text-center bg-gray-50 rounded-2xl py-8 px-4 mb-6 shadow-inner border border-gray-100" dir={currentQ.wordLanguage === "en" ? "ltr" : "rtl"}>
                <h2 className="text-3xl md:text-5xl font-black text-indigo-900 tracking-wide">{currentQ.word}</h2>
              </div>

              {quizFormat === 'choice' ? (
                <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                  {currentQ.options.map((option, idx) => {
                    let btnStyle = "bg-white border-2 border-gray-200 hover:border-purple-400 hover:bg-purple-50 text-gray-700";
                    if (showFeedback) {
                      if (option.isCorrect) btnStyle = "bg-green-100 border-2 border-green-500 text-green-800 scale-105 shadow-md";
                      else if (selectedOption === option && !option.isCorrect) btnStyle = "bg-red-100 border-2 border-red-500 text-red-800 opacity-70";
                      else btnStyle = "bg-gray-50 border-2 border-gray-100 text-gray-400 opacity-50";
                    }
                    return (
                      <button key={idx} type="button" onClick={() => handleOptionClick(option)} disabled={showFeedback} dir={quizMode === 'english' ? 'ltr' : 'rtl'} className={`p-4 rounded-2xl font-bold text-base md:text-lg transition-all duration-200 ease-in-out ${btnStyle}`}>
                        {option.text}
                      </button>
                    );
                  })}
                </div>
              ) : (
                <div className="space-y-4">
                  <form onSubmit={handleWrittenSubmit} className="space-y-4">
                    <div className="relative">
                      <input
                        ref={inputRef} type="text" value={writtenInput} onChange={(e) => setWrittenInput(e.target.value)} disabled={showFeedback}
                        placeholder={quizMode === 'english' ? 'הקלידי את הפירוש באנגלית...' : 'הקלידי את הפירוש בעברית...'}
                        dir={quizMode === 'english' ? 'ltr' : 'rtl'}
                        className={`w-full p-4 pr-4 rounded-2xl border-2 font-bold text-lg text-center transition-all duration-200 focus:outline-none focus:ring-4 ${showFeedback ? 'bg-gray-50 text-gray-500 border-gray-200' : 'border-purple-200 focus:border-purple-500 focus:ring-purple-200 bg-white text-gray-800'}`}
                      />
                    </div>
                    {!showFeedback && (
                      <button type="submit" disabled={!writtenInput.trim()} className={`w-full py-4 rounded-2xl font-bold text-lg text-white shadow-md transition-all duration-200 ${writtenInput.trim() ? 'bg-purple-600 hover:bg-purple-700 hover:shadow-lg' : 'bg-gray-300 cursor-not-allowed'}`}>
                        בדיקת תשובה ✨
                      </button>
                    )}
                  </form>

                  {showFeedback && (
                    <div className={`p-4 rounded-2xl border-2 animate-fadeIn transition-all duration-300 ${writtenFeedback === 'correct' ? 'bg-green-50 border-green-300 text-green-900' : 'bg-red-50 border-red-200 text-red-900'}`}>
                      <div className="flex items-center gap-3 mb-2 justify-center font-bold text-lg md:text-xl">
                        {writtenFeedback === 'correct' ? (
                          <><CheckCircle className="text-green-600 shrink-0" /><span>נכון מאוד! כל הכבוד! 🎉</span></>
                        ) : (
                          <><XCircle className="text-red-500 shrink-0" /><span>לא מדויק, לא נורא! 🐾</span></>
                        )}
                      </div>
                      <div className="text-center mt-3 bg-white/70 p-3 rounded-xl border border-white/50">
                        <p className="text-xs md:text-sm text-gray-500 mb-1">התשובה הנכונה ביותר:</p>
                        <p className="text-lg md:text-xl font-extrabold text-indigo-900 tracking-wide" dir={quizMode === 'english' ? 'ltr' : 'rtl'}>{currentQ.correctText}</p>
                      </div>
                      <button type="button" onClick={handleNextQuestion} className="mt-4 w-full bg-gradient-to-r from-pink-400 to-purple-500 hover:from-pink-500 hover:to-purple-600 text-white font-bold py-3 rounded-xl shadow-md transition-all duration-200">
                        המשך לשאלה הבאה 👍
                      </button>
                    </div>
                  )}
                </div>
              )}
            </div>

            <div className="text-center text-gray-400 text-sm flex items-center justify-center gap-2">
               פיצפץ ודפני מנמנמים ומאחלים לך 100 עגול! <Cat size={16} />
            </div>
          </div>
        </div>
      );
    }

    // ============================================================================
    // COMPONENT 2: INBAR'S APP
    // ============================================================================

    function InbarApp({ onSwitchSite }) {
      const [screen, setScreen] = useState('start'); 
      const [mode, setMode] = useState('mc'); 
      const [roundNumber, setRoundNumber] = useState(1);
      const [currentRoundWords, setCurrentRoundWords] = useState([]);
      const [failedWordsThisRound, setFailedWordsThisRound] = useState([]);
      const [successfulWordsCount, setSuccessfulWordsCount] = useState(0);
      const [currentWordIndex, setCurrentWordIndex] = useState(0);
      
      const [mcOptions, setMcOptions] = useState([]);
      const [typingInput, setTypingInput] = useState('');
      
      const [attemptsOnCurrentWord, setAttemptsOnCurrentWord] = useState(0);
      const [isWaitingForNext, setIsWaitingForNext] = useState(false);
      const [feedback, setFeedback] = useState(null); 
      
      const [shakeKey, setShakeKey] = useState(0);
      const [wrongBtnIndex, setWrongBtnIndex] = useState(-1);
      const [correctBtnIndex, setCorrectBtnIndex] = useState(-1);
      const [typingClass, setTypingClass] = useState('');
      const typingInputRef = useRef(null);

      const startGame = (selectedMode) => {
        setMode(selectedMode);
        setSuccessfulWordsCount(0);
        setRoundNumber(1);
        startRound(INBAR_VOCABULARY);
      };

      const startNextRound = () => {
        setRoundNumber(prev => prev + 1);
        startRound(failedWordsThisRound);
      };

      const startRound = (wordsArray) => {
        const shuffled = shuffleArray([...wordsArray]);
        setCurrentRoundWords(shuffled);
        setFailedWordsThisRound([]);
        setCurrentWordIndex(0);
        loadWord(0, shuffled);
        setScreen('game');
      };

      const loadWord = (index, roundWords) => {
        if (index >= roundWords.length) {
          handleEndOfRound();
          return;
        }
        
        setIsWaitingForNext(false);
        setAttemptsOnCurrentWord(0);
        setFeedback(null);
        setCorrectBtnIndex(-1);
        setWrongBtnIndex(-1);
        setTypingClass('');
        setTypingInput('');
        setShakeKey(0);
        
        const wordObj = roundWords[index];
        if (mode === 'mc') {
          let incorrect = INBAR_VOCABULARY.filter(w => w.en !== wordObj.en);
          incorrect = shuffleArray(incorrect).slice(0, 3);
          setMcOptions(shuffleArray([wordObj, ...incorrect]));
        } else {
          setTimeout(() => typingInputRef.current?.focus(), 50);
        }
      };

      const submitTyping = () => {
        if (isWaitingForNext) return;
        const userText = typingInput.trim().toLowerCase();
        if (!userText) return;
        
        const wordObj = currentRoundWords[currentWordIndex];
        let isCorrect = false;
        for (let validHe of wordObj.he) {
            if (userText === validHe.trim().toLowerCase()) {
                isCorrect = true;
                break;
            }
        }
        handleAnswer(isCorrect, -1, true);
      };

      const handleAnswer = (isCorrect, btnIndex = -1, isTyping = false) => {
        if (isWaitingForNext) return;
        const currentWord = currentRoundWords[currentWordIndex];

        if (isCorrect) {
          setIsWaitingForNext(true);
          setFeedback({ isCorrect: true, text: "מעולה! תשובה נכונה." });
          
          if (isTyping) setTypingClass('correct-anim');
          else setCorrectBtnIndex(btnIndex);

          if (attemptsOnCurrentWord === 0) {
            setSuccessfulWordsCount(prev => prev + 1);
          } else {
            if (!failedWordsThisRound.some(w => w.en === currentWord.en)) {
              setFailedWordsThisRound(prev => [...prev, currentWord]);
            }
          }
        } else {
          const newAttempts = attemptsOnCurrentWord + 1;
          setAttemptsOnCurrentWord(newAttempts);
          setShakeKey(prev => prev + 1); 

          if (isTyping) {
            setTypingClass('wrong-anim');
            setTimeout(() => setTypingClass(''), 500);
          } else {
            setWrongBtnIndex(btnIndex);
            setTimeout(() => setWrongBtnIndex(-1), 500);
          }

          if (newAttempts === 1) {
            setFeedback({ isCorrect: false, text: "טעות, נסי שוב!" });
            if (!failedWordsThisRound.some(w => w.en === currentWord.en)) {
              setFailedWordsThisRound(prev => [...prev, currentWord]);
            }
            if (isTyping) {
              setTypingInput('');
              setTimeout(() => typingInputRef.current?.focus(), 50);
            }
          } else {
            setIsWaitingForNext(true);
            setFeedback({ isCorrect: false, text: `התשובה הנכונה היא: ${currentWord.mainHe}` });
            if (!failedWordsThisRound.some(w => w.en === currentWord.en)) {
              setFailedWordsThisRound(prev => [...prev, currentWord]);
            }
          }
        }
      };

      const overrideAsCorrect = () => {
        const currentWord = currentRoundWords[currentWordIndex];
        setFailedWordsThisRound(prev => prev.filter(w => w.en !== currentWord.en));
        setSuccessfulWordsCount(prev => prev + 1);
        moveToNextWord();
      };

      const moveToNextWord = () => {
        const nextIndex = currentWordIndex + 1;
        setCurrentWordIndex(nextIndex);
        loadWord(nextIndex, currentRoundWords);
      };

      const handleEndOfRound = () => {
        setTimeout(() => {
          setScreen(prevScreen => {
            if (failedWordsThisRound.length > 0) return 'roundEnd';
            triggerConfetti();
            return 'victory';
          });
        }, 0);
      };

      const resetGame = () => setScreen('start');

      return (
        <div className="flex-grow flex items-center justify-center p-4 bg-gray-100 min-h-screen text-gray-800" dir="rtl">
          
          {screen === 'start' && (
            <button onClick={onSwitchSite} className="absolute top-4 left-4 bg-white hover:bg-gray-50 text-indigo-700 p-3 rounded-full shadow-sm flex items-center gap-2 transition-all font-bold border border-gray-200 z-10">
              <Home size={18} /> חזרה לפורטל הראשי
            </button>
          )}

          <div className="bg-white rounded-2xl shadow-xl w-full max-w-2xl overflow-hidden relative border border-gray-100 inbar-fade-in">
            <div className="bg-indigo-600 text-white p-6 text-center">
              <h1 className="text-3xl font-bold mb-2">אוצר מילים - The Giver</h1>
              <p className="text-indigo-200">פרקים 15-18</p>
            </div>

            <div className="p-6 md:p-8">
              {screen === 'start' && (
                <div className="text-center inbar-fade-in">
                  <h2 className="text-2xl font-semibold mb-6 text-gray-700">בחרי את מצב המשחק:</h2>
                  <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <button onClick={() => startGame('mc')} className="inbar-btn-hover-effect flex flex-col items-center justify-center p-6 bg-blue-50 border-2 border-blue-200 rounded-xl text-blue-700 hover:bg-blue-100 focus:outline-none focus:ring-4 focus:ring-blue-300">
                      <LayoutTemplate className="w-12 h-12 mb-3" />
                      <span className="text-xl font-bold">אמריקאי</span>
                      <span className="text-sm mt-2 text-blue-600/80">בחירה מתוך 4 תשובות</span>
                    </button>
                    <button onClick={() => startGame('typing')} className="inbar-btn-hover-effect flex flex-col items-center justify-center p-6 bg-purple-50 border-2 border-purple-200 rounded-xl text-purple-700 hover:bg-purple-100 focus:outline-none focus:ring-4 focus:ring-purple-300">
                      <PenTool className="w-12 h-12 mb-3" />
                      <span className="text-xl font-bold">כתיבה חופשית</span>
                      <span className="text-sm mt-2 text-purple-600/80">לכתוב את התרגום בעצמך</span>
                    </button>
                  </div>
                </div>
              )}

              {screen === 'game' && currentRoundWords[currentWordIndex] && (
                <div className="inbar-fade-in">
                  <div className="flex flex-col sm:flex-row justify-between items-center gap-4 mb-6 px-2">
                    <button onClick={resetGame} className="flex items-center gap-2 text-indigo-600 hover:text-indigo-800 bg-white border border-indigo-200 hover:border-indigo-300 px-4 py-2 rounded-full font-bold shadow-sm transition-all duration-150 self-start sm:self-auto text-sm">
                      <ArrowLeft size={16} /> חזרה לתפריט
                    </button>
                    <div className="flex justify-between items-center w-full sm:w-auto gap-4 text-sm font-medium text-gray-500 bg-gray-50 p-3 rounded-lg flex-grow sm:flex-grow-0">
                      <div className="flex items-center gap-2">
                        <span className="bg-indigo-100 text-indigo-700 px-2 py-1 rounded-md">סבב {roundNumber}</span>
                      </div>
                      <div>נשארו: <span className="font-bold text-gray-700">{currentRoundWords.length - currentWordIndex}</span></div>
                      <div className="text-green-600">הצלחות: <span className="font-bold">{successfulWordsCount}</span></div>
                    </div>
                  </div>

                  <div className="text-center mb-8">
                    <h3 className="text-gray-500 text-sm mb-1 uppercase tracking-wider font-semibold">איך אומרים בעברית?</h3>
                    <div key={shakeKey} className={`text-4xl md:text-5xl font-extrabold text-indigo-900 py-4 ${shakeKey > 0 ? 'inbar-shake' : ''}`} dir="ltr">
                      {currentRoundWords[currentWordIndex].en}
                    </div>
                  </div>

                  <div className="min-h-[160px]">
                    {mode === 'mc' ? (
                      <div className="grid grid-cols-1 md:grid-cols-2 gap-3">
                        {mcOptions.map((opt, i) => (
                          <button 
                            key={i} 
                            disabled={isWaitingForNext}
                            onClick={() => handleAnswer(opt.en === currentRoundWords[currentWordIndex].en, i, false)}
                            className={`p-4 border-2 border-gray-200 rounded-xl text-lg font-medium hover:bg-indigo-50 hover:border-indigo-300 transition-colors focus:outline-none ${correctBtnIndex === i ? 'correct-anim' : wrongBtnIndex === i ? 'wrong-anim' : ''}`}
                          >
                            {opt.mainHe}
                          </button>
                        ))}
                      </div>
                    ) : (
                      <div className="flex flex-col items-center">
                        <input 
                          ref={typingInputRef}
                          type="text" 
                          value={typingInput}
                          onChange={e => setTypingInput(e.target.value)}
                          onKeyDown={e => { if (e.key === 'Enter') submitTyping() }}
                          disabled={isWaitingForNext}
                          placeholder="הקלידי תרגום לעברית..."
                          className={`w-full md:w-2/3 p-4 text-center text-xl border-2 border-gray-300 rounded-xl focus:outline-none focus:border-indigo-500 focus:ring-2 focus:ring-indigo-200 transition-colors shadow-sm ${typingClass}`}
                        />
                        <button 
                          onClick={submitTyping}
                          disabled={isWaitingForNext}
                          className="mt-4 bg-indigo-600 text-white font-bold py-3 px-8 rounded-xl hover:bg-indigo-700 focus:ring-4 focus:ring-indigo-300 transition-colors inbar-btn-hover-effect w-full md:w-2/3 shadow-md"
                        >
                          בדוק תשובה
                        </button>
                      </div>
                    )}
                  </div>

                  <div className={`mt-6 text-center h-12 flex flex-col justify-center items-center font-bold text-lg rounded-lg transition-all p-2 ${feedback ? (feedback.isCorrect ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700') : ''}`}>
                    {feedback ? feedback.text : ''}
                  </div>

                  {isWaitingForNext && (
                    <div className="mt-4 flex flex-col md:flex-row items-center justify-center gap-3 inbar-fade-in w-full px-4">
                      {mode === 'typing' && !feedback.isCorrect && (
                        <button onClick={overrideAsCorrect} className="bg-yellow-500 text-white font-bold py-3 px-6 rounded-xl hover:bg-yellow-600 focus:ring-4 focus:ring-yellow-300 transition-colors inbar-btn-hover-effect shadow-md text-lg w-full md:w-auto">
                          זה מה שכתבתי (צדקתי) ✋
                        </button>
                      )}
                      <button onClick={moveToNextWord} autoFocus className="bg-gray-800 text-white font-bold py-3 px-8 rounded-xl hover:bg-gray-900 focus:ring-4 focus:ring-gray-300 transition-colors inbar-btn-hover-effect shadow-md text-lg w-full md:w-auto">
                        המשך למילה הבאה ➔
                      </button>
                    </div>
                  )}
                </div>
              )}

              {screen === 'roundEnd' && (
                <div className="text-center py-8 inbar-fade-in">
                  <div className="w-20 h-20 mx-auto bg-yellow-100 rounded-full flex items-center justify-center mb-4 text-yellow-500">
                    <RefreshCw className="w-10 h-10" />
                  </div>
                  <h2 className="text-3xl font-bold text-gray-800 mb-2">סוף סבב {roundNumber}</h2>
                  <p className="text-gray-600 mb-6 text-lg">כל הכבוד! יש עדיין מילים שצריך לתרגל.<br/>בואי ננסה שוב את המילים שלא הצלחת.</p>
                  <button onClick={startNextRound} className="bg-indigo-600 text-white font-bold py-3 px-8 rounded-xl hover:bg-indigo-700 inbar-btn-hover-effect shadow-md text-lg">
                    התחל סבב הבא
                  </button>
                </div>
              )}

              {screen === 'victory' && (
                <div className="text-center py-8 inbar-fade-in">
                  <div className="w-24 h-24 mx-auto bg-green-100 rounded-full flex items-center justify-center mb-4 text-green-500">
                    <CheckCircle className="w-12 h-12" />
                  </div>
                  <h2 className="text-3xl font-bold text-gray-800 mb-2">אלופה! 🎉</h2>
                  <p className="text-gray-600 mb-6 text-lg">הצלחת לתרגם את כל המילים בהצלחה מרובה!</p>
                  <button onClick={resetGame} className="bg-green-600 text-white font-bold py-3 px-8 rounded-xl hover:bg-green-700 inbar-btn-hover-effect shadow-md text-lg">
                    שחקי שוב מההתחלה
                  </button>
                </div>
              )}
            </div>
          </div>
        </div>
      );
    }

    // ============================================================================
    // COMPONENT 3: MAIN APP (THE PORTAL)
    // ============================================================================

    function App() {
      const [selectedSite, setSelectedSite] = useState(null); 

      return (
        <React.Fragment>
          {selectedSite === 'inbar' && <InbarApp onSwitchSite={() => setSelectedSite(null)} />}
          {selectedSite === 'shelly' && <ShellyApp onSwitchSite={() => setSelectedSite(null)} />}
          
          {!selectedSite && (
            <div dir="rtl" className="min-h-screen bg-gradient-to-br from-indigo-50 via-purple-50 to-pink-50 flex items-center justify-center p-4">
              <div className="bg-white/90 backdrop-blur-md rounded-3xl shadow-2xl p-8 max-w-3xl w-full text-center border-4 border-white">
                
                <div className="flex justify-center mb-6">
                  <div className="bg-gradient-to-r from-purple-100 to-pink-100 p-5 rounded-full shadow-inner">
                    <Sparkle className="w-12 h-12 text-purple-600" />
                  </div>
                </div>

                <h1 className="text-4xl md:text-5xl font-black text-transparent bg-clip-text bg-gradient-to-r from-indigo-600 to-pink-500 mb-4 tracking-tight">
                  פורטל אוצר המילים 📖
                </h1>
                <p className="text-lg md:text-xl text-gray-600 mb-10 font-medium">
                  ברוכה הבאה! באיזה אתר תרצי להשתמש היום לתרגול The Giver?
                </p>

                <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                  
                  {/* INBAR'S PORTAL BUTTON */}
                  <button 
                    onClick={() => setSelectedSite('inbar')} 
                    className="group relative overflow-hidden bg-white border-2 border-indigo-100 hover:border-indigo-400 p-6 rounded-2xl shadow-sm hover:shadow-xl transition-all duration-300 text-right text-gray-800 flex flex-col"
                  >
                    <div className="absolute top-0 left-0 w-2 h-full bg-indigo-500 opacity-0 group-hover:opacity-100 transition-opacity"></div>
                    <div className="flex justify-between items-start mb-4">
                      <div className="bg-indigo-100 p-3 rounded-xl text-indigo-600">
                        <LayoutTemplate size={28} />
                      </div>
                    </div>
                    <h2 className="text-2xl font-bold mb-2 text-indigo-900">האתר של ענבר</h2>
                    <p className="text-gray-500 text-sm mb-4">עיצוב קלאסי ונקי, עבודה לפי סבבים של הצלחות ותיקון טעויות חוזר.</p>
                    <div className="mt-auto pt-4 border-t border-gray-100 text-indigo-600 font-bold flex items-center gap-2 group-hover:translate-x-[-5px] transition-transform">
                      <ArrowLeft size={16} /> היכנסי לאתר
                    </div>
                  </button>

                  {/* SHELLY'S PORTAL BUTTON */}
                  <button 
                    onClick={() => setSelectedSite('shelly')} 
                    className="group relative overflow-hidden bg-white border-2 border-pink-100 hover:border-pink-400 p-6 rounded-2xl shadow-sm hover:shadow-xl transition-all duration-300 text-right text-gray-800 flex flex-col"
                  >
                    <div className="absolute top-0 left-0 w-2 h-full bg-pink-500 opacity-0 group-hover:opacity-100 transition-opacity"></div>
                    <div className="flex justify-between items-start mb-4">
                      <div className="bg-pink-100 p-3 rounded-xl text-pink-600">
                        <Cat size={28} />
                      </div>
                    </div>
                    <h2 className="text-2xl font-bold mb-2 text-pink-900">האתר של שלי</h2>
                    <p className="text-gray-500 text-sm mb-4">עם החתולים פיצפץ ודפני, בחירה בין תרגום מאנגלית לעברית ולהיפך.</p>
                    <div className="mt-auto pt-4 border-t border-gray-100 text-pink-600 font-bold flex items-center gap-2 group-hover:translate-x-[-5px] transition-transform">
                      <ArrowLeft size={16} /> היכנסי לאתר
                    </div>
                  </button>

                </div>
              </div>
            </div>
          )}
        </React.Fragment>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
